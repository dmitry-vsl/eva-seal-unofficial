name: Build EVA wheel

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        run: docker build --output type=local,dest=./dist -f Dockerfile.linux-build - < /dev/null

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: eva-wheel-linux-${{ matrix.arch }}
          path: dist/*.whl
